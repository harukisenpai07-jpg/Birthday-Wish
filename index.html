<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@1,500&family=Padauk:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Backgrounds -->
    <div id="bg-scene1" class="bg-layer bokeh-bg"></div>
    <div id="bg-scene2" class="bg-layer fireworks-bg">
        <canvas id="fireworks-canvas"></canvas>
    </div>

    <!-- Scene 1: The Setup -->
    <div id="scene1" class="scene">
        <div class="cake-wrapper">
            <div class="cake-container">
                <div class="heart-cake">
                    <div class="piping-container"></div>
                    <div class="cake-text">
                        Happy Birthday<br>Thae Ton
                    </div>
                    <div class="small-candles-container">
                        <div class="candle small-cake-candle c1">
                            <div class="flame"></div>
                            <div class="wick"></div>
                        </div>
                        <div class="candle small-cake-candle c2">
                            <div class="flame"></div>
                            <div class="wick"></div>
                        </div>
                        <div class="candle small-cake-candle c3">
                            <div class="flame"></div>
                            <div class="wick"></div>
                        </div>
                        <div class="candle small-cake-candle c4">
                            <div class="flame"></div>
                            <div class="wick"></div>
                        </div>
                        <div class="candle small-cake-candle c5">
                            <div class="flame"></div>
                            <div class="wick"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button id="blow-btn" class="liquid-button">Blow the candles</button>
    </div>

    <!-- Scene 2: The Reveal -->
    <div id="scene2" class="scene hidden">
        <div class="gift-container">
            <div class="gift-box flat-pink">
                <div class="box-bottom"></div>
                <div class="box-lid">
                    <div class="lid-piping"></div>
                    <div class="ribbon-vertical"></div>
                    <div class="ribbon-bow">
                        <div class="loop left-loop"></div>
                        <div class="loop right-loop"></div>
                        <div class="tie"></div>
                        <div class="tail left-tail"></div>
                        <div class="tail right-tail"></div>
                    </div>
                    <div class="gift-text">
                        HAPPY<br>BIRTHDAY<br><span class="heart-icon">♥</span>
                    </div>
                    <div class="roses">
                        <div class="rose pink"></div>
                        <div class="rose white"></div>
                        <div class="rose light-pink"></div>
                        <div class="leaf leaf-1"></div>
                        <div class="leaf leaf-2"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="message-card hidden">
            <h1 class="greeting">Happy Birthday 🥳ပါ သဲတုံးလေးရေ။</h1>
            <p class="message">
                မွေးနေ့မှစ နှစ်၁၀၀တိုင် စိတ်ချမ်းသာကိုယ်ကျန်းမာပြီး ကောင်းမွန်သောဘ၀ကိုပိုင်ဆိုင်ပါစေ🙏။<br>
                ကိုယ့်ပေါ်လဲပိုချစ်ပေးပါနော်😘<br>
                အရမ်းချစ်တယ်ချစ်မဝလေးရေ
            </p>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>

</html>
